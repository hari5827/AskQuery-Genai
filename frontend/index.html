<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/askquery-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <title>AskQuery</title>

    <!--
      Inline critical CSS so the dark theme + loading screen render
      instantly from raw HTML, before the JS bundle (and its Tailwind
      CSS) has loaded and executed. Prevents the blank white flash on
      first load / cold dev-server starts. Mirrors LoginTransition.jsx's
      animation (logoIn / textIn / pulseGlow) by hand, since Tailwind
      isn't available at this point yet.
    -->
    <style>
      html, body {
        background: #050505;
        margin: 0;
        height: 100%;
      }

      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #050505;
        z-index: 9999;
      }

      .loader-glow {
        position: absolute;
        width: 112px;
        height: 112px;
        border-radius: 9999px;
        background: rgba(185, 28, 28, 0.2);
        filter: blur(40px);
        animation: loaderPulseGlow 1.4s ease-in-out infinite;
      }

      .loader-logo {
        position: relative;
        width: 64px;
        height: 64px;
        object-fit: contain;
        animation: loaderLogoIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      .loader-text {
        position: relative;
        margin-top: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 700;
        letter-spacing: 0.02em;
        font-size: 20px;
        color: #fff;
        opacity: 0;
        animation: loaderTextIn 0.4s ease-out 0.25s both;
      }

      .loader-text span {
        color: #f87171;
      }

      @keyframes loaderLogoIn {
        from { opacity: 0; transform: scale(0.75); }
        to { opacity: 1; transform: scale(1); }
      }

      @keyframes loaderTextIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes loaderPulseGlow {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.15); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!--
        Static placeholder shown until React mounts and replaces this
        div's content — createRoot(...).render() overwrites everything
        inside #root, so this disappears automatically, no extra JS needed.
      -->
      <div id="initial-loader">
        <div class="loader-glow"></div>
        <img src="/askquery-logo.svg" alt="AskQuery" class="loader-logo" />
        <h1 class="loader-text">Ask<span>Query</span></h1>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
